name: simopiso
description: A premium Android-first expense and income goal planner.
publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ">=3.4.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.6.1
  go_router: ^16.0.0
  google_fonts: ^6.3.0
  intl: ^0.20.2
  uuid: ^4.5.1
  fl_chart: ^1.0.0
  table_calendar: ^3.2.0
  flutter_local_notifications: ^19.4.0
  pdf: ^3.11.3
  printing: ^5.14.2
  share_plus: ^11.1.0
  path_provider: ^2.1.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
